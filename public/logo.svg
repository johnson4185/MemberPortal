<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="35" fill="url(#logoGradient)"/>
  
  <!-- Shield icon (larger) -->
  <path d="M100 50 L145 68 L145 105 Q145 135 100 165 Q55 135 55 105 L55 68 Z" 
        fill="white" 
        stroke="white" 
        stroke-width="3"/>
  
  <!-- Internal shield detail -->
  <path d="M100 70 L130 82 L130 108 Q130 128 100 148 Q70 128 70 108 L70 82 Z" 
        fill="url(#logoGradient)" 
        opacity="0.25"/>
  
  <!-- Checkmark -->
  <path d="M85 105 L95 115 L115 90" 
        stroke="white" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Connection dots -->
  <circle cx="75" cy="135" r="4" fill="white" opacity="0.8"/>
  <circle cx="100" cy="145" r="4" fill="white" opacity="0.8"/>
  <circle cx="125" cy="135" r="4" fill="white" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="75" y1="135" x2="100" y2="145" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="145" x2="125" y2="135" stroke="white" stroke-width="2" opacity="0.6"/>
</svg>
